name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

concurrency:
  group: terraform-state
  cancel-in-progress: true

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY_SERVER: my-app-server
  ECR_REPOSITORY_CLIENT: my-app-client

jobs:
  terraform-build-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      ##################################################
      # Checkout
      ##################################################

      - name: Checkout Code
        uses: actions/checkout@v4

      ##################################################
      # Setup Terraform
      ##################################################

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      ##################################################
      # Configure AWS Credentials
      ##################################################

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      ##################################################
      # Terraform Init
      ##################################################

      - name: Terraform Init
        run: terraform init

      ##################################################
      # Terraform Validate
      ##################################################

      - name: Terraform Validate
        run: terraform validate

      ##################################################
      # Terraform Plan
      ##################################################

      - name: Terraform Plan
        run: terraform plan -input=false

      ##################################################
      # Terraform Apply
      ##################################################

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false

      ##################################################
      # Login to ECR
      ##################################################

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      ##################################################
      # Get AWS Account ID
      ##################################################

      - name: Get AWS Account ID
        id: aws_account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_OUTPUT

      ##################################################
      # Build and push server image
      ##################################################

      - name: Build and push server image
        uses: docker/build-push-action@v4
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.aws_account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_SERVER }}:latest

      ##################################################
      # Build and push client image
      ##################################################

      - name: Build and push client image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          file: ./client/dockerfile
          push: true
          tags: |
            ${{ steps.aws_account.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY_CLIENT }}:latest

      ##################################################
      # Deploy to ECS
      ##################################################

      - name: Force new deployment for server
        run: aws ecs update-service --cluster app-cluster-sambrid4 --service server-service-sambrid4 --force-new-deployment --region ${{ env.AWS_REGION }}

      - name: Force new deployment for client
        run: aws ecs update-service --cluster app-cluster-sambrid4 --service client-service-sambrid4 --force-new-deployment --region ${{ env.AWS_REGION }}
