name: Deploy Frontend to S3/CloudFront

on:
  workflow_run:
    workflows: ["Deploy ECS"]
    types: [completed]
    branches: [main]
  push:
    branches:
      - main
    paths:
      - 'client/**'
  workflow_dispatch:

jobs:
  scan:
    name: Trivy Vulnerability Scan
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: 'client/'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'table'
          # Output SARIF for GitHub Security tab integration
          output: 'trivy-results.sarif'
        # Continue to upload artifact even if Trivy finds vulnerabilities
        continue-on-error: false

      - name: Upload Trivy scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-results
          path: trivy-results.sarif
          retention-days: 30

  deploy:
    name: Build & Deploy
    needs: scan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Build React app
        env:
          # CRA inlines this at build time — must be set here, not at runtime
          REACT_APP_API_BASE_URL: ${{ secrets.REACT_APP_API_BASE_URL }}
        run: npm run build

      - name: Sync build to S3
        run: |
          aws s3 sync build/ s3://${{ secrets.FRONTEND_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
